<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>双色球分析系统</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="layout">
    <!-- 左侧导航 -->
    <nav class="sidebar">
      <div class="sidebar-title">双色球分析</div>
      <div class="menu-group">
        <div class="menu-group-title">开奖号码</div>
        <a class="menu-item" href="#" data-page="lottery-list">号码列表</a>
        <a class="menu-item" href="#" data-page="lottery-import">TXT 导入</a>
      </div>
      <div class="menu-group">
        <div class="menu-group-title">购买记录</div>
        <a class="menu-item" href="#" data-page="purchase-list">记录列表</a>
        <a class="menu-item" href="#" data-page="purchase-add">录入号码</a>
      </div>
      <div class="menu-group">
        <div class="menu-group-title">预测号码</div>
        <a class="menu-item" href="#" data-page="predict-list">预测列表</a>
      </div>
      <div class="menu-group">
        <div class="menu-group-title">规则推荐</div>
        <a class="menu-item" href="#" data-page="recommend">规则推荐</a>
      </div>
    </nav>

    <!-- 右侧内容区 -->
    <main class="content" id="main-content"></main>
  </div>

  <!-- 全局弹窗 -->
  <div class="modal-overlay" id="modal-overlay" style="display:none;">
    <div class="modal" id="modal">
      <div class="modal-header">
        <span id="modal-title"></span>
        <button class="modal-close" id="modal-close">&times;</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-footer" id="modal-footer"></div>
    </div>
  </div>

  <!-- 消息提示 -->
  <div id="toast-container"></div>

  <!-- 确认框 -->
  <div class="modal-overlay" id="confirm-overlay" style="display:none;">
    <div class="modal" style="max-width:400px;">
      <div class="modal-header">
        <span id="confirm-title">提示</span>
      </div>
      <div class="modal-body" id="confirm-body"></div>
      <div class="modal-footer">
        <button class="btn btn-default" id="confirm-cancel">取消</button>
        <button class="btn btn-danger" id="confirm-ok">确认</button>
      </div>
    </div>
  </div>

  <!-- 输入框弹窗 -->
  <div class="modal-overlay" id="prompt-overlay" style="display:none;">
    <div class="modal" style="max-width:400px;">
      <div class="modal-header">
        <span id="prompt-title"></span>
      </div>
      <div class="modal-body">
        <input class="form-input" id="prompt-input" type="text" />
        <div class="form-error" id="prompt-error" style="display:none;"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-default" id="prompt-cancel">取消</button>
        <button class="btn btn-primary" id="prompt-ok">确认</button>
      </div>
    </div>
  </div>

  <script src="api.js"></script>
  <script src="utils.js"></script>
  <script src="pages/lottery-list.js"></script>
  <script src="pages/lottery-import.js"></script>
  <script src="pages/purchase-list.js"></script>
  <script src="pages/purchase-add.js"></script>
  <script src="pages/predict-list.js"></script>
  <script src="pages/recommend.js"></script>
  <script src="router.js"></script>
</body>
</html>
