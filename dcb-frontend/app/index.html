<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>双色球分析系统</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- 顶部系统名称 -->
  <header class="app-header">
    <span class="app-title">双色球分析系统</span>
  </header>

  <!-- 数据卡片区 -->
  <section class="app-cards" id="app-cards">
    <div class="analysis-row" id="analysis-row">
      <span style="color:#909399;">📊 冷热号分析加载中...</span>
    </div>
  </section>

  <!-- Tab 容器 -->
  <div class="app-tabs-container">
    <!-- 主Tab -->
    <nav class="main-tabs" id="main-tabs">
      <button class="main-tab" data-main="lottery">开奖号码</button>
      <button class="main-tab" data-main="purchase">购买记录</button>
      <button class="main-tab" data-main="predict">预测号码</button>
      <button class="main-tab" data-main="recommend">规则推荐</button>
    </nav>

    <!-- 子Tab -->
    <nav class="sub-tabs" id="sub-tabs"></nav>

    <!-- 内容区 -->
    <main class="tab-content" id="main-content"></main>
  </div>

  <!-- 全局弹窗 -->
  <div class="modal-overlay" id="modal-overlay" style="display:none;">
    <div class="modal" id="modal">
      <div class="modal-header">
        <span id="modal-title"></span>
        <button class="modal-close" id="modal-close">&times;</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-footer" id="modal-footer"></div>
    </div>
  </div>

  <!-- 消息提示 -->
  <div id="toast-container"></div>

  <!-- 确认框 -->
  <div class="modal-overlay" id="confirm-overlay" style="display:none;">
    <div class="modal" style="max-width:400px;">
      <div class="modal-header"><span id="confirm-title">提示</span></div>
      <div class="modal-body" id="confirm-body"></div>
      <div class="modal-footer">
        <button class="btn btn-default" id="confirm-cancel">取消</button>
        <button class="btn btn-danger" id="confirm-ok">确认</button>
      </div>
    </div>
  </div>

  <!-- 输入框弹窗 -->
  <div class="modal-overlay" id="prompt-overlay" style="display:none;">
    <div class="modal" style="max-width:400px;">
      <div class="modal-header"><span id="prompt-title"></span></div>
      <div class="modal-body">
        <input class="form-input" id="prompt-input" type="text" />
        <div class="form-error" id="prompt-error" style="display:none;"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-default" id="prompt-cancel">取消</button>
        <button class="btn btn-primary" id="prompt-ok">确认</button>
      </div>
    </div>
  </div>

  <script src="api.js"></script>
  <script src="utils.js"></script>
  <script src="pages/calc-error-log.js"></script>
  <script src="pages/lottery-list.js"></script>
  <script src="pages/lottery-import.js"></script>
  <script src="pages/purchase-list.js"></script>
  <script src="pages/purchase-add.js"></script>
  <script src="pages/predict-list.js"></script>
  <script src="pages/recommend.js"></script>
  <script src="router.js"></script>
  <script>
    // 冷热号分析（页面加载时异步请求，不影响其他数据加载）
    (function(){
      var row = document.getElementById('analysis-row');
      if(!row) return;
      fetch(BASE_URL + '/api/lottery/analysis')
        .then(function(r){ return r.json() })
        .then(function(res){
          if(res.code !== 200) return;
          var d = res.data;
          var periods = [100, 50, 20, 10];
          var pad = function(n){ return String(n).padStart(2,'0') };
          var html = '';
          periods.forEach(function(p){
            var data = d['periods' + p];
            if(!data) return;
            html += '<div class="analysis-card">';
            html += '<div class="card-title">📊 近' + p + '期冷热号 <span class="badge">' + data.sampleSize + '期样本</span></div>';
            html += '<div class="ball-row"><span class="label">🔴热号</span>';
            data.redHot.forEach(function(n){ html += '<span class="ball ball-red">' + pad(n) + '</span>' });
            html += '</div>';
            html += '<div class="ball-row"><span class="label">🔴冷号</span>';
            data.redCold.forEach(function(n){ html += '<span class="ball ball-red" style="opacity:0.5;">' + pad(n) + '</span>' });
            html += '</div>';
            html += '<div class="ball-row"><span class="label">🔵热号</span>';
            data.blueHot.forEach(function(n){ html += '<span class="ball ball-blue">' + pad(n) + '</span>' });
            html += '</div>';
            html += '<div class="ball-row"><span class="label">🔵冷号</span>';
            data.blueCold.forEach(function(n){ html += '<span class="ball ball-blue" style="opacity:0.5;">' + pad(n) + '</span>' });
            html += '</div>';
            html += '</div>';
          });
          row.innerHTML = html;
        })
        .catch(function(){ row.innerHTML = '<span style="color:#f56c6c;">分析数据加载失败</span>' });
    })();
  </script>
</body>
</html>
