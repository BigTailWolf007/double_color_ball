<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>双色球分析系统</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- 侧边栏 + 主内容区布局 -->
  <div class="app-layout">
    <!-- 侧边栏 -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <span class="sidebar-logo">🎱</span>
        <span class="sidebar-title">双色球分析系统</span>
      </div>
      <nav class="sidebar-nav" id="sidebar-nav">
        <a class="nav-item active" data-page="dashboard">📊 仪表盘</a>
        <div class="nav-group">
          <span class="nav-group-title">业务管理</span>
          <a class="nav-item" data-page="lottery-list">🎯 开奖号码</a>
          <a class="nav-item" data-page="purchase-list">💰 购买记录</a>
          <a class="nav-item" data-page="predict-list">🔮 预测号码</a>
          <a class="nav-item" data-page="recommend">🧩 规则推荐</a>
        </div>
        <div class="nav-group">
          <span class="nav-group-title">系统管理</span>
          <a class="nav-item" data-page="sys-config">⚙️ 系统配置</a>
          <a class="nav-item" data-page="user-manage">👥 用户管理</a>
          <a class="nav-item" data-page="user-activity">📈 活跃度</a>
          <a class="nav-item" data-page="order-manage">📦 订单管理</a>
        </div>
        <a class="nav-item" data-page="calc-error-log">⚠️ 错误日志</a>
      </nav>
      <div class="sidebar-footer">
        <span id="sidebar-nickname">管理员</span>
        <button class="btn btn-link" id="sidebar-logout" style="color:#f56c6c;font-size:12px;">退出</button>
      </div>
    </aside>

    <!-- 主内容区 -->
    <main class="main-content" id="main-content"></main>
  </div>

  <!-- 全局弹窗 -->
  <div class="modal-overlay" id="modal-overlay" style="display:none;">
    <div class="modal" id="modal">
      <div class="modal-header">
        <span id="modal-title"></span>
        <button class="modal-close" id="modal-close">&times;</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-footer" id="modal-footer"></div>
    </div>
  </div>

  <!-- 消息提示 -->
  <div id="toast-container"></div>

  <!-- 确认框 -->
  <div class="modal-overlay" id="confirm-overlay" style="display:none;">
    <div class="modal" style="max-width:400px;">
      <div class="modal-header"><span id="confirm-title">提示</span></div>
      <div class="modal-body" id="confirm-body"></div>
      <div class="modal-footer">
        <button class="btn btn-default" id="confirm-cancel">取消</button>
        <button class="btn btn-danger" id="confirm-ok">确认</button>
      </div>
    </div>
  </div>

  <!-- 输入框弹窗 -->
  <div class="modal-overlay" id="prompt-overlay" style="display:none;">
    <div class="modal" style="max-width:400px;">
      <div class="modal-header"><span id="prompt-title"></span></div>
      <div class="modal-body">
        <input class="form-input" id="prompt-input" type="text" />
        <div class="form-error" id="prompt-error" style="display:none;"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-default" id="prompt-cancel">取消</button>
        <button class="btn btn-primary" id="prompt-ok">确认</button>
      </div>
    </div>
  </div>

  <script src="session.js"></script>
  <script src="api.js"></script>
  <script src="utils.js"></script>
  <script src="pages/calc-error-log.js"></script>
  <script src="pages/lottery-list.js"></script>
  <script src="pages/lottery-import.js"></script>
  <script src="pages/purchase-list.js"></script>
  <script src="pages/purchase-add.js"></script>
  <script src="pages/predict-list.js"></script>
  <script src="pages/recommend.js"></script>
  <script src="pages/dashboard.js"></script>
  <script src="pages/sys-config.js"></script>
  <script src="pages/user-manage.js"></script>
  <script src="pages/user-activity.js"></script>
  <script src="pages/order-manage.js"></script>
  <script src="pages/login.js"></script>
  <script src="router.js"></script>
  <script>
    // 登录检查
    (function(){
      if (!Session.getToken()) {
        LoginPage.render()
        return
      }
      // 显示侧边栏用户信息
      try {
        var user = Session.getUser()
        var nickEl = document.getElementById('sidebar-nickname')
        if (nickEl) nickEl.textContent = user.nickname || '管理员'
      } catch(e) {}
      // 退出按钮
      var logoutBtn = document.getElementById('sidebar-logout')
      if (logoutBtn) {
        logoutBtn.addEventListener('click', function(){
          Session.clear()
          location.reload()
        })
      }
      // 侧边栏导航
      var nav = document.getElementById('sidebar-nav')
      if (nav) {
        nav.addEventListener('click', function(e){
          var item = e.target.closest('.nav-item')
          if (!item) return
          e.preventDefault()
          var page = item.dataset.page
          if (page) {
            // 高亮当前菜单项
            nav.querySelectorAll('.nav-item').forEach(function(el){ el.classList.remove('active') })
            item.classList.add('active')
            // 更新 URL hash
            location.hash = page
            // 渲染页面
            var fn = PAGES[page]
            if (fn) { fn() } else { Dashboard.render() }
          }
        })
      }
      // 初始路由
      var initPage = location.hash.replace('#', '') || 'dashboard'
      var activeItem = nav && nav.querySelector('[data-page="' + initPage + '"]')
      if (activeItem) {
        nav.querySelectorAll('.nav-item').forEach(function(el){ el.classList.remove('active') })
        activeItem.classList.add('active')
      }
      var fn = PAGES[initPage]
      if (fn) { fn() } else { Dashboard.render() }
    })()
  </script>
</body>
</html>
